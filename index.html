<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reactive Cone Drill</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2rem 1.5rem; }
  .app { width: 100%; max-width: 400px; }
  h1 { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #444; text-align: center; margin-bottom: 2rem; }
  .cone-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; width: 220px; height: 220px; margin: 0 auto 1.25rem; }
  .cone { border-radius: 10px; border: 1px solid #222; background: #161616; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #444; text-align: center; line-height: 1.4; padding: 8px; transition: background 0.12s, border-color 0.12s, color 0.12s; }
  .cone.active { background: #1a3a1a; border-color: #3a7a3a; color: #7ecf7e; }
  .cone.done { background: #0c1e30; border-color: #185FA5; color: #378ADD; }
  .direction-label { font-size: 40px; font-weight: 600; text-align: center; min-height: 52px; letter-spacing: -1px; color: #f0f0f0; margin-bottom: 0.25rem; }
  .movement-label { font-size: 16px; text-align: center; min-height: 24px; color: #888; margin-bottom: 0.25rem; }
  .rep-counter { font-size: 13px; color: #444; text-align: center; min-height: 18px; margin-bottom: 0.25rem; }
  .phase-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #555; text-align: center; min-height: 16px; margin-bottom: 1rem; }
  .divider { height: 1px; background: #1e1e1e; margin: 1.25rem 0; }
  .section-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #555; margin-bottom: 8px; }
  .pattern-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .pattern-btn { font-size: 11px; padding: 8px 4px; border-radius: 6px; border: 1px solid #222; background: #161616; color: #555; cursor: pointer; text-align: center; line-height: 1.3; transition: background 0.1s, border-color 0.1s, color 0.1s; }
  .pattern-btn:hover { border-color: #333; color: #888; }
  .pattern-btn.active { background: #1a3a1a; border-color: #3a7a3a; color: #7ecf7e; }
  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-row label { font-size: 13px; color: #555; white-space: nowrap; }
  input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 2px; background: #333; border-radius: 1px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #f0f0f0; cursor: pointer; }
  .slider-val { font-size: 13px; font-weight: 500; color: #777; min-width: 64px; text-align: right; }
  .btn-row { display: flex; gap: 8px; }
  .btn-primary { flex: 1; padding: 14px; font-size: 16px; font-weight: 500; border-radius: 8px; border: none; background: #f0f0f0; color: #0f0f0f; cursor: pointer; transition: transform 0.08s; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { padding: 14px 20px; font-size: 16px; border-radius: 8px; border: 1px solid #222; background: transparent; color: #555; cursor: pointer; transition: border-color 0.1s, color 0.1s; }
  .btn-secondary:hover { border-color: #444; color: #888; }

  .feedback-section { width: 100%; max-width: 400px; margin-top: 2rem; }
  .feedback-toggle { width: 100%; padding: 12px; font-size: 13px; background: transparent; border: 1px solid #222; border-radius: 8px; color: #555; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; transition: border-color 0.1s, color 0.1s; }
  .feedback-toggle:hover { border-color: #333; color: #888; }
  .feedback-toggle .arrow { font-size: 10px; transition: transform 0.2s; }
  .feedback-toggle.open .arrow { transform: rotate(180deg); }
  .feedback-body { display: none; margin-top: 10px; background: #161616; border: 1px solid #222; border-radius: 8px; padding: 1rem; }
  .feedback-body.open { display: block; }
  .feedback-body textarea { width: 100%; background: #0f0f0f; border: 1px solid #222; border-radius: 6px; color: #f0f0f0; font-size: 13px; font-family: inherit; padding: 10px; resize: vertical; min-height: 90px; outline: none; transition: border-color 0.1s; }
  .feedback-body textarea:focus { border-color: #444; }
  .feedback-body textarea::placeholder { color: #444; }
  .feedback-submit { margin-top: 8px; padding: 10px 18px; font-size: 13px; border-radius: 6px; border: none; background: #f0f0f0; color: #0f0f0f; cursor: pointer; font-weight: 500; transition: transform 0.08s; }
  .feedback-submit:active { transform: scale(0.98); }
  .feedback-thanks { font-size: 13px; color: #7ecf7e; margin-top: 8px; display: none; }


</style>
</head>
<body>

<div class="app">
  <h1>Reactive Cone Drill</h1>

  <div class="cone-grid">
    <div class="cone" id="cone-fl">Front<br>left</div>
    <div class="cone" id="cone-fr">Front<br>right</div>
    <div class="cone" id="cone-bl">Back<br>left</div>
    <div class="cone" id="cone-br">Back<br>right</div>
  </div>

  <div class="direction-label" id="dir-label">—</div>
  <div class="movement-label" id="move-label"></div>
  <div class="rep-counter" id="rep-counter"></div>
  <div class="phase-label" id="phase-label"></div>

  <div class="divider"></div>

  <div class="section-label">Movement pattern</div>
  <div class="pattern-grid">
    <button class="pattern-btn active" data-move="Sprint" onclick="setPattern(this)">Sprint</button>
    <button class="pattern-btn" data-move="Shuffle" onclick="setPattern(this)">Shuffle</button>
    <button class="pattern-btn" data-move="Backpedal" onclick="setPattern(this)">Back-<br>pedal</button>
    <button class="pattern-btn" data-move="Crossover" onclick="setPattern(this)">Cross-<br>over</button>
    <button class="pattern-btn" data-move="Random" onclick="setPattern(this)">Random</button>
  </div>

  <div class="divider"></div>

  <div class="slider-row">
    <label for="delay-slider">Time between calls</label>
    <input type="range" id="delay-slider" min="2" max="10" value="4" step="1" oninput="updateDelay(this.value)">
    <span class="slider-val" id="delay-out">4s</span>
  </div>
  <div class="slider-row">
    <label for="reps-slider">Reps per cone</label>
    <input type="range" id="reps-slider" min="1" max="10" value="3" step="1" oninput="updateRepsTarget(this.value)">
    <span class="slider-val" id="reps-out">3 × 4 = 12</span>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button class="btn-primary" id="start-btn" onclick="toggleDrill()">Start</button>
    <button class="btn-secondary" onclick="resetDrill()">Reset</button>
  </div>
</div>

<div class="feedback-section">
  <button class="feedback-toggle" id="feedback-toggle" onclick="toggleFeedback()">
    <span>Leave feedback</span>
    <span class="arrow">▼</span>
  </button>
  <div class="feedback-body" id="feedback-body">
    <textarea id="feedback-text" placeholder="What do you think? Any suggestions or issues?"></textarea>
    <br>
    <button class="feedback-submit" onclick="submitFeedback()">Send feedback</button>
    <div class="feedback-thanks" id="feedback-thanks">Thanks for the feedback!</div>
  </div>
</div>


<script>
const CONES = [
  { id: 'cone-fl', label: 'Front left'  },
  { id: 'cone-fr', label: 'Front right' },
  { id: 'cone-bl', label: 'Back left'   },
  { id: 'cone-br', label: 'Back right'  },
];
const MOVES = ['Sprint', 'Shuffle', 'Backpedal', 'Crossover'];

let running = false;
let timer = null;
let countdownTimer = null;
let delayMs = 4000;
let lastCallTime = 0;
let repsPerCone = 3;
let selectedMove = 'Sprint';
let coneCounts = [0,0,0,0];
let lastCone = -1;
let totalCalled = 0;
const synth = window.speechSynthesis;

function setPattern(btn) {
  document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMove = btn.dataset.move;
}

function updateDelay(val) {
  delayMs = parseInt(val) * 1000;
  document.getElementById('delay-out').textContent = val + 's';
  if (running) {
    clearTimeout(timer);
    const remaining = Math.max(0, delayMs - (Date.now() - lastCallTime));
    timer = setTimeout(() => {
      callDirection();
      timer = setInterval(callDirection, delayMs);
    }, remaining);
  }
}

function updateRepsTarget(val) {
  repsPerCone = parseInt(val);
  document.getElementById('reps-out').textContent = val + ' × 4 = ' + (val * 4);
}

function speak(text) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.0;
  synth.speak(u);
}

function getAvailableCones() {
  return CONES.reduce((acc, c, i) => {
    if (coneCounts[i] < repsPerCone && i !== lastCone) acc.push(i);
    return acc;
  }, []);
}

function pickCone() {
  let available = getAvailableCones();
  if (available.length === 0) {
    available = CONES.reduce((acc, c, i) => {
      if (coneCounts[i] < repsPerCone) acc.push(i);
      return acc;
    }, []);
  }
  if (available.length === 0) return null;
  const idx = available[Math.floor(Math.random() * available.length)];
  lastCone = idx;
  return { cone: CONES[idx], idx };
}

function pickMove() {
  if (selectedMove === 'Random') return MOVES[Math.floor(Math.random() * MOVES.length)];
  return selectedMove;
}

function updateConeVisuals() {
  CONES.forEach((c, i) => {
    const el = document.getElementById(c.id);
    el.classList.remove('active', 'done');
    if (coneCounts[i] >= repsPerCone) el.classList.add('done');
  });
}

function callDirection() {
  lastCallTime = Date.now();
  const result = pickCone();
  if (!result) { endSet(); return; }
  const { cone, idx } = result;
  const move = pickMove();
  coneCounts[idx]++;
  totalCalled++;
  updateConeVisuals();
  document.getElementById(cone.id).classList.add('active');
  document.getElementById('dir-label').textContent = cone.label;
  document.getElementById('move-label').textContent = move;
  document.getElementById('phase-label').textContent = '';
  speak(cone.label + ' — ' + move);
  const total = repsPerCone * 4;
  document.getElementById('rep-counter').textContent = totalCalled + ' / ' + total;
  if (totalCalled >= total) {
    clearTimeout(timer); timer = null;
    setTimeout(endSet, 1500);
  }
}

function endSet() {
  running = false;
  clearTimeout(timer); timer = null;
  synth.cancel();
  document.getElementById('start-btn').textContent = 'Start';
  document.getElementById('dir-label').textContent = 'Done';
  document.getElementById('move-label').textContent = '';
  document.getElementById('phase-label').textContent = 'Set complete — rest up';
  document.querySelectorAll('.cone').forEach(c => c.classList.remove('active'));
  speak('Set complete. Well done.');
}

function startCountdown(cb) {
  let count = 5;
  document.getElementById('dir-label').textContent = count;
  document.getElementById('move-label').textContent = '';
  document.getElementById('phase-label').textContent = 'Get ready';
  speak('Starting in 5');
  countdownTimer = setInterval(() => {
    count--;
    if (count > 0) {
      document.getElementById('dir-label').textContent = count;
      speak(String(count));
    } else {
      clearInterval(countdownTimer);
      cb();
    }
  }, 1000);
}

function toggleDrill() {
  running ? stopDrill() : startDrill();
}

function startDrill() {
  running = true;
  document.getElementById('start-btn').textContent = 'Pause';
  startCountdown(() => {
    callDirection();
    timer = setInterval(callDirection, delayMs);
  });
}

function stopDrill() {
  running = false;
  clearTimeout(timer); timer = null;
  clearInterval(countdownTimer); countdownTimer = null;
  synth.cancel();
  document.getElementById('start-btn').textContent = 'Resume';
  document.getElementById('phase-label').textContent = 'Paused';
}

function resetDrill() {
  stopDrill();
  running = false; coneCounts = [0,0,0,0]; lastCone = -1; totalCalled = 0;
  document.getElementById('start-btn').textContent = 'Start';
  document.getElementById('dir-label').textContent = '—';
  document.getElementById('move-label').textContent = '';
  document.getElementById('rep-counter').textContent = '';
  document.getElementById('phase-label').textContent = '';
  document.querySelectorAll('.cone').forEach(c => c.classList.remove('active', 'done'));
}

function toggleFeedback() {
  const toggle = document.getElementById('feedback-toggle');
  const body = document.getElementById('feedback-body');
  toggle.classList.toggle('open');
  body.classList.toggle('open');
}

async function submitFeedback() {
  const text = document.getElementById('feedback-text').value.trim();
  if (!text) return;
  const btn = document.querySelector('.feedback-submit');
  btn.textContent = 'Sending...';
  btn.disabled = true;
  try {
    const res = await fetch('https://formspree.io/f/xkoepdaa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    if (res.ok) {
      document.getElementById('feedback-text').value = '';
      document.getElementById('feedback-thanks').style.display = 'block';
      setTimeout(() => { document.getElementById('feedback-thanks').style.display = 'none'; }, 3000);
    } else {
      document.getElementById('feedback-thanks').textContent = 'Something went wrong. Try again.';
      document.getElementById('feedback-thanks').style.color = '#e87070';
      document.getElementById('feedback-thanks').style.display = 'block';
      setTimeout(() => {
        document.getElementById('feedback-thanks').style.display = 'none';
        document.getElementById('feedback-thanks').textContent = 'Thanks for the feedback!';
        document.getElementById('feedback-thanks').style.color = '#7ecf7e';
      }, 3000);
    }
  } catch {
    document.getElementById('feedback-thanks').textContent = 'No connection. Try again.';
    document.getElementById('feedback-thanks').style.color = '#e87070';
    document.getElementById('feedback-thanks').style.display = 'block';
    setTimeout(() => {
      document.getElementById('feedback-thanks').style.display = 'none';
      document.getElementById('feedback-thanks').textContent = 'Thanks for the feedback!';
      document.getElementById('feedback-thanks').style.color = '#7ecf7e';
    }, 3000);
  }
  btn.textContent = 'Send feedback';
  btn.disabled = false;
}
</script>
</body>
</html>
